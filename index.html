<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPGSV EXIM - Logistics & Customs Solutions</title>
    <style>
        :root {
            --bg-main: #0a0f1d;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --border-color: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(10, 15, 29, 0.8);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 24px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--accent-blue);
        }

        main {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .hero h2 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 18px;
            margin-bottom: 40px;
        }

        .enquiry-form-container {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 12px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-main);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background-color: rgba(10, 15, 29, 0.8);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 6px;
            color: var(--text-main);
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .submit-btn {
            background-color: var(--accent-blue);
            color: #0a0f1d;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #7dd3fc;
        }

        footer {
            background-color: #070a14;
            border-top: 1px solid var(--border-color);
            padding: 40px 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 80px;
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
            }
            nav {
                flex-wrap: wrap;
                justify-content: center;
            }
            nav a {
                margin: 5px 12px;
            }
            .enquiry-form-container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <h1>LPGSV EXIM</h1>
            </div>
            <nav>
                <a href="#">Home</a>
                <a href="#">Services</a>
                <a href="#">Enquiry</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="hero">
            <h2>Customs Clearance & Global Logistics</h2>
            <p>Streamline your import and export operations with precise, regulatory-compliant supply chain solutions management.</p>
        </div>

        <div class="enquiry-form-container">
            <form action="https://forminit.com/f/ajp9gml4f5x" method="POST">
                <div class="form-group">
                    <label for="company">Company Name</label>
                    <input type="text" id="company" name="fi_text_company" class="form-control" placeholder="Your Company Name" required>
                </div>
                <div class="form-group">
                    <label for="name">Contact Person</label>
                    <input type="text" id="name" name="fi_sender_fullName" class="form-control" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="fi_sender_email" class="form-control" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="fi_text_phone" class="form-control" placeholder="Your Phone Number" required>
                </div>
                <div class="form-group">
                    <label for="requirements">Exim/Logistics Requirements</label>
                    <textarea id="requirements" name="fi_text_requirements" class="form-control" rows="4" placeholder="Briefly describe your import, export, or customs clearance requirements..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit Enquiry</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 LPGSV EXIM. All rights reserved.</p>
    </footer>

</body>
</html>
