<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPGSV EXIM</title>
    <style>
        body { background-color: #0b0f17; color: #f8fafc; font-family: sans-serif; padding: 50px; text-align: center; }
        .box { background: #131a26; padding: 30px; border-radius: 8px; border: 1px solid #3b82f6; max-width: 500px; margin: 0 auto; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; background: #0f1319; color: white; border: 1px solid #3b82f6; border-radius: 4px; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>LPGSV EXIM Portal</h1>
        <p>Testing Emergency Email Link Infrastructure</p>
        <hr style="border-color: #3b82f6; margin: 20px 0;">
        
        <form action="https://formsubmit.co/sndplal@gmail.com" method="POST">
            <input type="text" name="company" placeholder="Company Name" required>
            <input type="email" name="email" placeholder="Your Email Address" required>
            <select name="product">
                <option value="Floriculture">Floriculture</option>
                <option value="Logistics">Logistics Operations</option>
            </select>
            <textarea name="message" rows="4" placeholder="Message Requirements" required></textarea>
            <button type="submit">Submit Test Inquiry</button>
        </form>
    </div>

</body>
</html>
